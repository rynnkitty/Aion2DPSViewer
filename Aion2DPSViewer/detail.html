<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:rgba(11,15,32,0.95);
  --tb:rgba(7,10,24,0.97);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.04);
  --text:#ddeeff;
  --muted:#5577aa;
  --dim:#334466;
  --accent:#4488ff;
  --green:#3ddc84;
  --red:#e74c3c;
  --orange:#f39c12;
  --purple:#9b59b6;
  --teal:#1abc9c;
  --gold:#ffd060;
  --fn:'Segoe UI','Malgun Gothic',sans-serif;
  --fm:'Consolas','Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--fn)}
body{background:transparent;color:var(--text);font-size:11px;user-select:none;-webkit-user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative;border:1px solid var(--border);border-radius:4px;overflow:hidden}

/* ── resize handles ── */
.rz{position:absolute;z-index:200}
.rz-n{top:0;left:8px;right:8px;height:5px;cursor:n-resize}
.rz-s{bottom:0;left:8px;right:8px;height:5px;cursor:s-resize}
.rz-e{right:0;top:8px;bottom:8px;width:5px;cursor:e-resize}
.rz-w{left:0;top:8px;bottom:8px;width:5px;cursor:w-resize}
.rz-ne{top:0;right:0;width:10px;height:10px;cursor:ne-resize}
.rz-nw{top:0;left:0;width:10px;height:10px;cursor:nw-resize}
.rz-se{bottom:0;right:0;width:10px;height:10px;cursor:se-resize}
.rz-sw{bottom:0;left:0;width:10px;height:10px;cursor:sw-resize}

/* ── header ── */
#hdr{
  height:30px;min-height:30px;flex-shrink:0;
  background:var(--tb);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 6px;gap:6px;
}
#hdr .player-name{font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.h-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.h-stat{display:flex;align-items:center;gap:3px;flex-shrink:0}
.h-label{font-size:9px;color:var(--dim)}
.h-val{font-family:var(--fm);font-size:10px;color:var(--text)}
.h-val.accent{color:var(--accent)}
.h-val.red{color:var(--red)}
.h-val.orange{color:var(--orange)}
.h-val.purple{color:var(--purple)}
.h-val.teal{color:var(--teal)}
.h-val.green{color:var(--green)}
.h-flex{flex:1}
#btn-close{
  width:20px;height:20px;border:none;background:transparent;
  color:var(--dim);font-size:13px;cursor:pointer;border-radius:2px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .12s;
}
#btn-close:hover{color:#ff4444;background:rgba(255,40,40,0.15)}

/* ── empty state ── */
#empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:11px;opacity:.5;letter-spacing:.3px;
}

/* ── table area ── */
#table-wrap{
  flex:1;overflow-y:auto;overflow-x:auto;
  scrollbar-width:thin;scrollbar-color:rgba(68,136,255,0.2) transparent;
}
#table-wrap::-webkit-scrollbar{width:3px;height:3px}
#table-wrap::-webkit-scrollbar-track{background:transparent}
#table-wrap::-webkit-scrollbar-thumb{background:rgba(68,136,255,0.2);border-radius:2px}

table{width:100%;border-collapse:collapse;font-size:10px}
thead tr{position:sticky;top:0;z-index:10}
th{
  background:var(--tb);color:var(--dim);font-weight:600;
  text-align:right;padding:3px 4px;white-space:nowrap;
  border-bottom:1px solid var(--border);font-size:9px;letter-spacing:.2px;
}
th.col-skill{text-align:left;min-width:110px}
th.col-spec{text-align:center;padding:3px 2px}
td{
  padding:2px 4px;text-align:right;white-space:nowrap;
  border-bottom:1px solid var(--border2);
  font-family:var(--fm);font-size:10px;color:var(--muted);
}
td.col-skill{text-align:left;font-family:var(--fn);color:var(--text)}
td.col-spec{text-align:center;padding:2px}
.col-crit{color:var(--red) !important}
.col-back{color:var(--orange) !important}
.col-total{color:var(--accent) !important;font-weight:700}
tbody tr:hover{background:rgba(255,255,255,0.03)}

/* ── skill cell ── */
.skill-cell{position:relative;display:flex;align-items:center;gap:3px;height:20px}
.skill-bar-bg{position:absolute;inset:0;background:rgba(40,50,70,0.4);border-radius:1px;overflow:hidden}
.skill-bar-fill{height:100%;border-radius:1px;opacity:.22;transition:width .3s}
.skill-icon{position:relative;z-index:1;width:16px;height:16px;border-radius:2px;flex-shrink:0;object-fit:cover}
.skill-dot{position:relative;z-index:1;width:7px;height:7px;border-radius:1px;flex-shrink:0}
.skill-name{position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;font-size:10px;padding:0 2px}

/* ── spec boxes ── */
.spec-boxes{display:flex;gap:2px;justify-content:center}
.spec-box{width:7px;height:7px;border-radius:1px;background:rgba(80,90,110,0.4);border:1px solid rgba(100,120,160,0.25)}
.spec-box.on{background:var(--green);border-color:var(--green);box-shadow:0 0 3px rgba(61,220,132,0.4)}
.spec-box.stigma{background:var(--gold);border-color:var(--gold);box-shadow:0 0 3px rgba(240,192,64,0.4)}

/* ── buff section ── */
#buff-section{
  flex-shrink:0;border-top:1px solid var(--border);
  padding:5px 6px;max-height:140px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(68,136,255,0.2) transparent;
}
#buff-section::-webkit-scrollbar{width:3px}
#buff-section::-webkit-scrollbar-thumb{background:rgba(68,136,255,0.2);border-radius:2px}
.buff-title{font-size:9px;color:var(--dim);font-weight:600;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.buff-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.buff-icon{width:14px;height:14px;border-radius:2px;flex-shrink:0;object-fit:cover}
.buff-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:var(--text)}
.buff-pct{font-family:var(--fm);font-size:10px;color:var(--muted);width:36px;text-align:right;flex-shrink:0}
.buff-bar-bg{flex:0 0 64px;height:4px;background:rgba(40,50,70,0.5);border-radius:2px;overflow:hidden}
.buff-bar-fill{height:100%;border-radius:2px;background:var(--accent);opacity:.65}
.buff-sec-label{font-family:var(--fm);font-size:9px;color:var(--dim);width:28px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <!-- resize handles -->
  <div class="rz rz-nw" data-dir="top-left"></div>
  <div class="rz rz-n"  data-dir="top"></div>
  <div class="rz rz-ne" data-dir="top-right"></div>
  <div class="rz rz-e"  data-dir="right"></div>
  <div class="rz rz-se" data-dir="bottom-right"></div>
  <div class="rz rz-s"  data-dir="bottom"></div>
  <div class="rz rz-sw" data-dir="bottom-left"></div>
  <div class="rz rz-w"  data-dir="left"></div>

  <!-- header -->
  <div id="hdr">
    <span id="player-name" class="player-name">-</span>
    <div class="h-sep"></div>
    <div class="h-stat"><span class="h-label">피해</span><span class="h-val accent" id="h-total">0</span></div>
    <div class="h-sep"></div>
    <div class="h-stat"><span class="h-label">치명</span><span class="h-val red" id="h-crit">0.0%</span></div>
    <div class="h-stat"><span class="h-label">강타</span><span class="h-val purple" id="h-hard">0.0%</span></div>
    <div class="h-stat"><span class="h-label">다단</span><span class="h-val teal" id="h-multi">0.0%</span></div>
    <div class="h-stat"><span class="h-label">후방</span><span class="h-val orange" id="h-back">0.0%</span></div>
    <div class="h-stat" id="h-heal-wrap" style="display:none"><span class="h-label">힐</span><span class="h-val green" id="h-heal">0</span></div>
    <div class="h-flex"></div>
    <button id="btn-close" title="닫기">✕</button>
  </div>

  <!-- empty -->
  <div id="empty">데이터 없음</div>

  <!-- table -->
  <div id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th class="col-skill">스킬</th>
          <th class="col-spec">특화</th>
          <th>타수</th>
          <th>일반</th>
          <th class="col-crit">치명타</th>
          <th class="col-back">후방</th>
          <th>강타</th>
          <th>완벽</th>
          <th>다단</th>
          <th>회피</th>
          <th>막기</th>
          <th>초당</th>
          <th>평균</th>
          <th>최소</th>
          <th>최대</th>
          <th class="col-total">피해</th>
        </tr>
      </thead>
      <tbody id="skill-tbody"></tbody>
    </table>
  </div>

  <!-- buff uptime -->
  <div id="buff-section" style="display:none">
    <div class="buff-title">버프 업타임</div>
    <div id="buff-list"></div>
  </div>
</div>

<script>
(function(){
'use strict';

// ── job colors ───────────────────────────────────
const JOB_COLORS = {
  0:'#e74c3c',1:'#e67e22',2:'#9b59b6',3:'#2ecc71',
  4:'#3498db',5:'#1abc9c',6:'#f1c40f',7:'#e84393'
};

// ── resize ────────────────────────────────────────
let _resizing = false;
document.querySelectorAll('.rz').forEach(function(el){
  el.addEventListener('mousedown', function(e){
    e.preventDefault();
    _resizing = true;
    send({type:'resize-start', dir:el.dataset.dir});
  });
});
window.addEventListener('mouseup', function(){
  if(_resizing){ _resizing=false; send({type:'mouse-up'}); }
});

// ── close ─────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', function(){
  send({type:'close'});
});

// ── utils ─────────────────────────────────────────
function send(msg){ try{ window.chrome.webview.postMessage(msg); }catch(e){} }
function fmt(n){ return Number(n||0).toLocaleString('ko-KR'); }
function pct(count, total){ return total>0 ? (count/total*100).toFixed(1) : '0.0'; }
function esc(s){
  const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML;
}
function maskNm(name){
  if(!name) return name;
  const m=name.match(/^(.+?)(\[.+\])$/);
  const nick=m?m[1]:name;
  if(nick.length<=1) return '*';
  if(nick.length===2) return nick[0]+'*';
  return nick[0]+'*'.repeat(nick.length-1);
}

// ── updateData ────────────────────────────────────
function updateData(jsonStr){
  try{
    const d = JSON.parse(jsonStr);
    if(!d || !d.topSkills || d.topSkills.length===0){
      document.getElementById('empty').style.display='flex';
      document.getElementById('table-wrap').style.display='none';
      document.getElementById('buff-section').style.display='none';
      document.getElementById('player-name').textContent='-';
      document.getElementById('h-total').textContent='0';
      document.getElementById('h-crit').textContent='0.0%';
      document.getElementById('h-hard').textContent='0.0%';
      document.getElementById('h-multi').textContent='0.0%';
      document.getElementById('h-back').textContent='0.0%';
      document.getElementById('h-heal-wrap').style.display='none';
      return;
    }

    const color = JOB_COLORS[d.jobCode] || '#95a5a6';
    const totalHits  = d.topSkills.reduce(function(a,s){ return a+s.hitCount; }, 0);
    const totalBack  = d.topSkills.reduce(function(a,s){ return a+s.backCount; }, 0);
    const totalHard  = d.topSkills.reduce(function(a,s){ return a+s.hardHitCount; }, 0);
    const totalMulti = d.topSkills.reduce(function(a,s){ return a+s.multiHitCount; }, 0);

    // header
    document.getElementById('player-name').textContent = d.maskNick ? maskNm(d.name) : d.name;
    document.getElementById('h-total').textContent = fmt(d.totalDamage);
    document.getElementById('h-crit').textContent  = d.critRate.toFixed(1)+'%';
    document.getElementById('h-hard').textContent  = pct(totalHard, totalHits)+'%';
    document.getElementById('h-multi').textContent = pct(totalMulti, totalHits)+'%';
    document.getElementById('h-back').textContent  = pct(totalBack, totalHits)+'%';
    const healWrap = document.getElementById('h-heal-wrap');
    if(d.healTotal > 0){
      document.getElementById('h-heal').textContent = fmt(d.healTotal);
      healWrap.style.display='flex';
    } else {
      healWrap.style.display='none';
    }

    // skill rows
    let rows = '';
    for(const s of d.topSkills){
      rows += '<tr>';
      // skill name cell with bar bg
      rows += '<td class="col-skill"><div class="skill-cell">';
      rows += '<div class="skill-bar-bg"><div class="skill-bar-fill" style="width:'+s.percent.toFixed(1)+'%;background:'+color+'"></div></div>';
      if(s.iconUrl){
        rows += '<img class="skill-icon" src="'+esc(s.iconUrl)+'" onerror="this.style.display=\'none\'" />';
      } else {
        rows += '<span class="skill-dot" style="background:'+color+'"></span>';
      }
      rows += '<span class="skill-name">'+esc(s.name)+'</span>';
      rows += '</div></td>';

      // spec column
      rows += '<td class="col-spec">';
      if(s.specs && s.specs.length > 0){
        const isStigma = s.skillType === 'stigma';
        const maxBox = isStigma ? 4 : 5;
        const maxSpec = isStigma ? Math.max.apply(null, s.specs) : 0;
        rows += '<div class="spec-boxes">';
        for(let si=1; si<=maxBox; si++){
          const on = isStigma ? (si<=maxSpec) : (s.specs.indexOf(si)>=0);
          rows += '<span class="spec-box'+(on?(isStigma?' stigma':' on'):'')+'"></span>';
        }
        rows += '</div>';
      }
      rows += '</td>';

      rows += '<td>'+s.hitCount+'</td>';
      rows += '<td>'+pct(s.normalCount,s.hitCount)+'%</td>';
      rows += '<td class="col-crit">'+pct(s.critCount,s.hitCount)+'%</td>';
      rows += '<td class="col-back">'+pct(s.backCount,s.hitCount)+'%</td>';
      rows += '<td>'+pct(s.hardHitCount,s.hitCount)+'%</td>';
      rows += '<td>'+pct(s.perfectCount,s.hitCount)+'%</td>';
      rows += '<td>'+pct(s.multiHitCount,s.hitCount)+'%</td>';
      rows += '<td>'+pct(s.evadeCount,s.hitCount)+'%</td>';
      rows += '<td>'+pct(s.blockCount,s.hitCount)+'%</td>';
      rows += '<td>'+fmt(s.dps)+'</td>';
      rows += '<td>'+fmt(s.avgDamage)+'</td>';
      rows += '<td>'+fmt(s.minDamage)+'</td>';
      rows += '<td>'+fmt(s.maxDamage)+'</td>';
      rows += '<td class="col-total">'+fmt(s.totalDamage)+' <span style="color:var(--dim);font-size:9px">('+s.percent.toFixed(1)+'%)</span></td>';
      rows += '</tr>';
    }
    document.getElementById('skill-tbody').innerHTML = rows;

    // show table
    document.getElementById('empty').style.display='none';
    document.getElementById('table-wrap').style.display='block';

    // buff uptime
    const buffSection = document.getElementById('buff-section');
    const buffList = document.getElementById('buff-list');
    if(d.buffUptime && d.buffUptime.length > 0){
      const top = d.buffUptime.slice(0, 15);
      let bRows = '';
      for(const b of top){
        const p = Math.min(100, b.uptimePercent).toFixed(1);
        bRows += '<div class="buff-row">';
        if(b.iconUrl) bRows += '<img class="buff-icon" src="'+esc(b.iconUrl)+'" onerror="this.style.display=\'none\'" />';
        bRows += '<span class="buff-name">'+esc(b.name)+'</span>';
        bRows += '<span class="buff-pct">'+b.uptimePercent.toFixed(1)+'%</span>';
        bRows += '<div class="buff-bar-bg"><div class="buff-bar-fill" style="width:'+p+'%"></div></div>';
        bRows += '<span class="buff-sec-label">'+b.uptimeSeconds.toFixed(0)+'s</span>';
        bRows += '</div>';
      }
      buffList.innerHTML = bRows;
      buffSection.style.display = 'block';
    } else {
      buffSection.style.display = 'none';
    }
  } catch(e){ console.error('updateData', e); }
}

// ── applyTheme ────────────────────────────────────
const THEME_PRESETS = {
  midnight:{'--bg-app-rgb':'11,15,32','--bg-titlebar-rgb':'7,10,24','--accent':'#4488ff','--text-primary':'#ddeeff','--text-secondary':'#5577aa','--text-muted':'#334466','--gold':'#ffd060','--green':'#3ddc84'},
  abyss:   {'--bg-app-rgb':'6,5,16',  '--bg-titlebar-rgb':'10,8,26','--accent':'#9b7aff','--text-primary':'#d8d0e8','--text-secondary':'#8878aa','--text-muted':'#504568','--gold':'#e0c060','--green':'#60c890'},
  deva:    {'--bg-app-rgb':'8,14,24', '--bg-titlebar-rgb':'5,10,20','--accent':'#60c0ff','--text-primary':'#d0e0f0','--text-secondary':'#7090b0','--text-muted':'#405060','--gold':'#f0d060','--green':'#50c880'},
  asmodian:{'--bg-app-rgb':'16,8,14', '--bg-titlebar-rgb':'12,5,10','--accent':'#c070dd','--text-primary':'#e0d0e0','--text-secondary':'#a080a0','--text-muted':'#604860','--gold':'#e0c060','--green':'#60c880'},
  flame:   {'--bg-app-rgb':'16,8,6',  '--bg-titlebar-rgb':'14,6,4', '--accent':'#e08040','--text-primary':'#f0e0d0','--text-secondary':'#a08070','--text-muted':'#604840','--gold':'#ffc040','--green':'#70c070'},
  glass:   {'--bg-app-rgb':'0,0,0',   '--bg-titlebar-rgb':'0,0,0',  '--accent':'#7ab4ff','--text-primary':'#ffffff','--text-secondary':'#a0a8b8','--text-muted':'#606878','--gold':'#ffd060','--green':'#60d080'}
};

function applyTheme(jsonStr){
  try{
    const t = JSON.parse(jsonStr);
    const base = THEME_PRESETS[t.preset] || THEME_PRESETS.midnight;
    const vars = Object.assign({}, base, t.customVars || {});
    const r = document.documentElement.style;
    const bg = vars['--bg-app-rgb'] || '11,15,32';
    const tb = vars['--bg-titlebar-rgb'] || '7,10,24';
    r.setProperty('--bg',   'rgba('+bg+',0.95)');
    r.setProperty('--tb',   'rgba('+tb+',0.97)');
    r.setProperty('--text', vars['--text-primary']  || '#ddeeff');
    r.setProperty('--muted',vars['--text-secondary'] || '#5577aa');
    r.setProperty('--dim',  vars['--text-muted']     || '#334466');
    r.setProperty('--accent',vars['--accent']        || '#4488ff');
    r.setProperty('--green', vars['--green']          || '#3ddc84');
    r.setProperty('--gold',  vars['--gold']           || '#ffd060');
    if(t.fontFamily) document.body.style.fontFamily = t.fontFamily;
  } catch(e){ console.error('applyTheme', e); }
}

// expose to C# host
window.updateData = updateData;
window.applyTheme = applyTheme;

})();
</script>
</body>
</html>
