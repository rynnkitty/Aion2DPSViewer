<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:rgba(11,15,32,0.93);
  --tb:rgba(7,10,24,0.97);
  --sr:rgba(9,13,28,0.95);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.04);
  --text:#ddeeff;
  --muted:#5577aa;
  --dim:#334466;
  --accent:#4488ff;
  --green:#3ddc84;
  --logo:#64c8ff;
  --dps-active:#f0a500;
  --fn:'Segoe UI','Malgun Gothic',sans-serif;
  --fm:'Consolas','Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--fn)}
body{background:transparent;color:var(--text);font-size:11px;user-select:none;-webkit-user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative}

/* resize handles */
.rz{position:absolute;z-index:200}
.rz-n{top:0;left:8px;right:8px;height:5px;cursor:n-resize}
.rz-s{bottom:0;left:8px;right:8px;height:5px;cursor:s-resize}
.rz-e{right:0;top:8px;bottom:8px;width:5px;cursor:e-resize}
.rz-w{left:0;top:8px;bottom:8px;width:5px;cursor:w-resize}
.rz-ne{top:0;right:0;width:10px;height:10px;cursor:ne-resize}
.rz-nw{top:0;left:0;width:10px;height:10px;cursor:nw-resize}
.rz-se{bottom:0;right:0;width:10px;height:10px;cursor:se-resize}
.rz-sw{bottom:0;left:0;width:10px;height:10px;cursor:sw-resize}

/* ── Title bar ── */
#tb{
  height:32px;min-height:32px;flex-shrink:0;
  background:var(--tb);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 5px 0 7px;gap:0;
  cursor:move;
}
.brand{display:flex;flex-direction:column;justify-content:center;margin-right:6px;line-height:1;cursor:move;flex-shrink:0}
.brand-name{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--logo)}
.brand-ver{font-size:8px;color:var(--muted);letter-spacing:.5px;margin-top:1px}
.tab-group{display:flex;align-items:center;gap:2px;flex-shrink:0}
.tabx{
  height:22px;padding:0 9px;border:none;
  background:transparent;color:var(--muted);
  font-size:10px;font-family:var(--fn);font-weight:600;
  cursor:pointer;border-radius:3px;transition:all .12s;
  letter-spacing:.3px;
}
.tabx:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.tabx.active-lookup{color:#fff;background:rgba(255,255,255,0.1)}
.tabx.active-dps{color:#1a1000;background:var(--dps-active);font-weight:700}
.tb-sep{flex:1;cursor:move}
.ctrl-group{display:flex;align-items:center;gap:1px;flex-shrink:0}
.ctrl{
  width:22px;height:22px;border:none;background:transparent;
  color:var(--muted);font-size:12px;cursor:pointer;
  border-radius:2px;transition:all .12s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ctrl:hover{color:var(--text);background:rgba(255,255,255,0.07)}
.ctrl.active{color:var(--accent)}
#btn-close:hover{color:#ff4444;background:rgba(255,40,40,0.15)}
#opacity-wrap{display:flex;align-items:center;padding:0 2px;flex-shrink:0}
#opacity-slider{
  width:44px;height:3px;cursor:pointer;
  -webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,0.15);border-radius:2px;outline:none;
}
#opacity-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:9px;height:9px;border-radius:50%;
  background:var(--accent);cursor:pointer;
}

/* ── Status row ── */
#sr{
  height:22px;min-height:22px;flex-shrink:0;
  background:var(--sr);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 6px;gap:6px;
}
.st-dot{width:6px;height:6px;border-radius:50%;background:#334466;flex-shrink:0;transition:background .3s}
.st-dot.ok{background:var(--green)}
.st-dot.err{background:#ff4444}
#st-text{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
#st-text .st-name{color:var(--text);font-weight:600}
#st-text .st-ping{color:var(--muted);font-family:var(--fm)}
.sort-group{display:flex;gap:2px;flex-shrink:0}
.sbtn{
  height:16px;padding:0 5px;border:none;border-radius:2px;
  font-size:9px;font-family:var(--fn);font-weight:600;cursor:pointer;
  background:rgba(255,255,255,0.06);color:var(--muted);
  transition:all .12s;letter-spacing:.2px;
}
.sbtn:hover{opacity:.8}
.sbtn.s0{color:#cc4444}.sbtn.s0.on{background:#cc4444;color:#fff}
.sbtn.s1{color:#cc44aa}.sbtn.s1.on{background:#cc44aa;color:#fff}
.sbtn.s2{color:#4499cc}.sbtn.s2.on{background:#4499cc;color:#fff}
.sbtn.s3{color:#778899}.sbtn.s3.on{background:#778899;color:#fff}

/* ── Content ── */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tab-pane{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.tab-pane.active{display:flex}

/* ── 조회 tab ── */
#lookup-pane{}
#party-list{flex:1;overflow-y:auto;overflow-x:hidden}
#party-list::-webkit-scrollbar{width:2px}
#party-list::-webkit-scrollbar-thumb{background:rgba(68,136,255,0.2);border-radius:1px}
.party-row{
  display:flex;align-items:center;gap:7px;
  padding:5px 8px;border-bottom:1px solid var(--border2);
  cursor:default;transition:background .1s;
}
.party-row:hover{background:rgba(255,255,255,0.03)}
.job-icon{
  width:22px;height:22px;border-radius:3px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;letter-spacing:0;
}
.party-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.party-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.party-name .srv{color:var(--muted);font-weight:400}
.party-loading{font-size:10px;color:var(--muted);font-style:italic}
.party-cp{font-family:var(--fm);font-size:11px;color:#88ccff;text-align:right;flex-shrink:0;min-width:54px}
.self-badge{
  height:16px;padding:0 5px;border-radius:2px;
  background:rgba(61,220,132,0.2);border:1px solid rgba(61,220,132,0.3);
  color:var(--green);font-size:9px;font-weight:700;
  display:flex;align-items:center;flex-shrink:0;
}
.flag-badge{
  height:16px;padding:0 5px;border-radius:2px;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;flex-shrink:0;
}
.jonggul-badge{background:rgba(204,68,68,0.2);border:1px solid rgba(204,68,68,0.35);color:#cc4444}
.naked-badge{background:rgba(204,68,170,0.2);border:1px solid rgba(204,68,170,0.35);color:#cc44aa}
.empty-msg{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:11px;opacity:.45;letter-spacing:.3px;
}

/* ── DPS tab ── */
#dps-pane{}
#dps-inforow{
  height:20px;min-height:20px;flex-shrink:0;
  display:flex;align-items:center;padding:0 8px;gap:0;
  border-bottom:1px solid var(--border2);background:rgba(0,0,0,0.12);
}
#dps-elapsed{font-family:var(--fm);font-size:10px;color:var(--muted)}
#dps-inforow .i-sep{flex:1}
#dps-total{font-size:10px;color:var(--muted);margin-right:4px}
#btn-shot{
  width:18px;height:18px;border:none;background:transparent;
  color:var(--dim);font-size:11px;cursor:pointer;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
}
#btn-shot:hover{color:var(--muted);background:rgba(255,255,255,0.06)}

#dps-list{flex:1;overflow-y:auto;overflow-x:hidden}
#dps-list::-webkit-scrollbar{width:2px}
#dps-list::-webkit-scrollbar-thumb{background:rgba(68,136,255,0.2);border-radius:1px}

.dps-row{
  display:flex;align-items:center;gap:0;
  padding:0 8px;height:28px;
  border-bottom:1px solid var(--border2);
  cursor:pointer;transition:background .1s;position:relative;overflow:hidden;
}
.dps-row:hover{background:rgba(255,255,255,0.04)}
.dps-bar{
  position:absolute;left:0;top:0;bottom:0;
  opacity:.15;transition:width .4s ease;pointer-events:none;
}
.dps-rank{font-size:9px;color:var(--dim);width:14px;text-align:center;flex-shrink:0;z-index:1}
.dps-job{
  width:20px;height:20px;border-radius:2px;flex-shrink:0;z-index:1;margin:0 4px 0 2px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#fff;
}
.dps-name{flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:1;font-weight:500}
.dps-val{font-family:var(--fm);font-size:11px;color:var(--text);text-align:right;z-index:1;min-width:54px;flex-shrink:0}
.dps-pct{font-family:var(--fm);font-size:10px;color:var(--muted);text-align:right;z-index:1;min-width:34px;flex-shrink:0}
.dps-crit{font-family:var(--fm);font-size:10px;color:var(--dim);text-align:right;z-index:1;min-width:32px;flex-shrink:0}

/* ── Compact ── */
#app.compact #tb{display:none}
#app.compact #sr{display:none}
#app.compact #content{display:none}
#compact-bar{
  display:none;height:100%;
  background:rgba(7,10,24,0.95);align-items:center;
  padding:0 8px;gap:6px;cursor:move;
}
#app.compact{background:rgba(7,10,24,0.95)}
#app.compact #compact-bar{display:flex}
.c-dot{width:5px;height:5px;border-radius:50%;background:#334466;flex-shrink:0}
.c-dot.ok{background:var(--green)}
.c-name{font-size:10px;color:var(--muted);max-width:70px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.c-dps{font-family:var(--fm);font-size:11px;color:var(--dps-active);font-weight:700}
.c-label{font-size:9px;color:var(--dim)}
</style>
</head>
<body>
<div id="app">
  <!-- resize -->
  <div class="rz rz-nw" data-dir="top-left"></div>
  <div class="rz rz-n"  data-dir="top"></div>
  <div class="rz rz-ne" data-dir="top-right"></div>
  <div class="rz rz-e"  data-dir="right"></div>
  <div class="rz rz-se" data-dir="bottom-right"></div>
  <div class="rz rz-s"  data-dir="bottom"></div>
  <div class="rz rz-sw" data-dir="bottom-left"></div>
  <div class="rz rz-w"  data-dir="left"></div>

  <!-- compact -->
  <div id="compact-bar">
    <div class="c-dot" id="c-dot"></div>
    <span class="c-name" id="c-name">-</span>
    <div style="flex:1"></div>
    <span class="c-label">DPS</span>
    <span class="c-dps" id="c-dps">-</span>
  </div>

  <!-- title bar -->
  <div id="tb">
    <div class="brand">
      <span class="brand-name">Aion2Info</span>
      <span class="brand-ver" id="brand-ver">v0.0.0</span>
    </div>
    <div class="tab-group">
      <button class="tabx active-lookup" id="tab-lookup" onclick="switchTab('lookup')">조회</button>
      <button class="tabx" id="tab-dps" onclick="switchTab('dps')">DPS</button>
    </div>
    <div class="tb-sep"></div>
    <div class="ctrl-group">
        <!--<button class="ctrl" id="btn-vis" title="표시/숨기기">👁</button>-->
        <button class="ctrl" id="btn-lock" title="클릭 잠금">🔓</button>
        <div id="opacity-wrap">
          <input id="opacity-slider" type="range" min="10" max="100" value="80" title="투명도">
        </div>
        <button class="ctrl" id="btn-reset" title="초기화">↺</button>
        <button class="ctrl" id="btn-settings" title="설정">⚙</button>
        <button class="ctrl" id="btn-close" title="닫기">✕</button>
      </div>
    </div>

    <!-- status row -->
        <div id="sr">
            <div class="st-dot" id="st-dot"></div>
            <span id="st-text">연결 대기중...</span>
            <div class="sort-group">
                <button class="sbtn s0 on" id="sb0" onclick="setSort(0)">종굴</button>
                <button class="sbtn s1 on" id="sb1" onclick="setSort(1)">아이고</button>
                <button class="sbtn s2 on" id="sb2" onclick="setSort(2)">전투력</button>
            </div>
        </div>

        <!-- content -->
        <div id="content">
            <!-- 조회 tab -->
            <div class="tab-pane active" id="lookup-pane">
                <div id="party-list">
                    <div class="empty-msg" id="party-empty">파티 없음</div>
                </div>
            </div>

            <!-- DPS tab -->
            <div class="tab-pane" id="dps-pane">
                <div id="dps-inforow">
                    <span id="dps-elapsed">0초</span>
                    <div class="i-sep"></div>
                    <span id="dps-total">총 0</span>
                    <button id="btn-shot" title="스냅샷">▣</button>
                </div>
                <div id="dps-list">
                    <div class="empty-msg" id="dps-empty">대미지 데이터 없음</div>
                </div>
            </div>
        </div>
    </div>

<script>
(function(){
'use strict';

// ── Job colors & labels ──────────────────────────
const JOB_CODE_TO_KR = {7:'검성',8:'검성',11:'수호성',12:'수호성',15:'궁성',16:'궁성',
  19:'살성',20:'살성',23:'정령성',24:'정령성',27:'정령성',28:'마도성',31:'치유성',32:'치유성',35:'호법성',36:'호법성'};
const JOB_KR_TO_SHORT = {'검성':'검','궁성':'궁','마도성':'마','살성':'살','수호성':'수','정령성':'정','치유성':'치','호법성':'호'};
const JOB_KR_TO_COLOR = {
  '검성':'#cc3333','궁성':'#44aa44','마도성':'#4466cc','살성':'#aa44aa',
  '수호성':'#cc8800','정령성':'#2299aa','치유성':'#33aa66','호법성':'#9944aa'
};

// Sort modes: 0=DPS순, 1=전체피해, 2=전투력
const SORT_LABELS = ['종굴','아이고','전투력'];

// ── 테마 ────────────────────────────────────────
const THEME_PRESETS = {
  midnight:{'--bg-app-rgb':'8, 10, 18','--bg-titlebar-rgb':'20, 35, 70','--accent':'#7ab4ff','--text-primary':'#e0e0e0','--text-secondary':'#8899aa','--text-muted':'#555','--gold':'#ffd060','--name-elyos':'#70c8ff','--green':'#5cc88a'},
  abyss:   {'--bg-app-rgb':'6, 5, 16','--bg-titlebar-rgb':'30, 20, 55','--accent':'#9b7aff','--text-primary':'#d8d0e8','--text-secondary':'#8878aa','--text-muted':'#504568','--gold':'#e0c060','--name-elyos':'#80a8ff','--green':'#60c890'},
  deva:    {'--bg-app-rgb':'8, 14, 24','--bg-titlebar-rgb':'15, 30, 60','--accent':'#60c0ff','--text-primary':'#d0e0f0','--text-secondary':'#7090b0','--text-muted':'#405060','--gold':'#f0d060','--name-elyos':'#80d0ff','--green':'#50c880'},
  asmodian:{'--bg-app-rgb':'16, 8, 14','--bg-titlebar-rgb':'40, 18, 35','--accent':'#c070dd','--text-primary':'#e0d0e0','--text-secondary':'#a080a0','--text-muted':'#604860','--gold':'#e0c060','--name-elyos':'#70b0e0','--green':'#60c880'},
  flame:   {'--bg-app-rgb':'16, 8, 6','--bg-titlebar-rgb':'50, 25, 15','--accent':'#e08040','--text-primary':'#f0e0d0','--text-secondary':'#a08070','--text-muted':'#604840','--gold':'#ffc040','--name-elyos':'#70b0d0','--green':'#70c070'},
  glass:   {'--bg-app-rgb':'0, 0, 0','--bg-titlebar-rgb':'0, 0, 0','--accent':'#7ab4ff','--text-primary':'#ffffff','--text-secondary':'#a0a8b8','--text-muted':'#606878','--gold':'#ffd060','--name-elyos':'#80d0ff','--green':'#60d080'}
};
function applyTheme(t){
  if(!t) return;
  const base=THEME_PRESETS[t.preset]||THEME_PRESETS.midnight;
  const v=Object.assign({},base,t.customVars||{});
  const r=document.documentElement.style;
  const bg=v['--bg-app-rgb']||'8,10,18';
  const tb=v['--bg-titlebar-rgb']||'20,35,70';
  r.setProperty('--bg',`rgba(${bg},0.93)`);
  r.setProperty('--tb',`rgba(${tb},0.97)`);
  r.setProperty('--sr',`rgba(${bg},0.95)`);
  r.setProperty('--text',v['--text-primary']||'#ddeeff');
  r.setProperty('--muted',v['--text-secondary']||'#5577aa');
  r.setProperty('--dim',v['--text-muted']||'#334466');
  r.setProperty('--accent',v['--accent']||'#4488ff');
  r.setProperty('--logo',v['--name-elyos']||'#64c8ff');
  r.setProperty('--green',v['--green']||'#3ddc84');
  r.setProperty('--dps-active',v['--gold']||'#f0a500');
  if(t.fontFamily) r.setProperty('--fn',t.fontFamily);
  if(t.jobColors){
    Object.assign(JOB_KR_TO_COLOR,t.jobColors);
    renderLookup();
    renderDps();
  }
}

const S = window.__SETTINGS__ || {};

// ── State ────────────────────────────────────────
let state = {
  tab: 'lookup',
  compact: false,
  clickLocked: false,
  displayModes: [true, true, true], // [종굴, 아이고, 전투력] 표시 여부
  // settings
  dpsPercentMode: S.dpsPercentMode || 'party',
  scoreFormat: S.scoreFormat || 'full',
  dpsTimeMode: S.dpsTimeMode || 'wallclock',
  autoTabSwitch: S.autoTabSwitch ?? true,
  // sniffer
  snifferOk: false,
  snifferMsg: '연결 대기중...',
  snifferErr: false,
  // self
  selfKey: null,        // "nickname:serverId"
  selfName: null,
  ping: -1,
  // party members: key = "nickname:serverId"
  partyMap: {},         // {nickname, serverId, serverName, loading, error, cp, className, jobCode}
  partyOrder: [],       // ordered keys
  // dps
  dpsPlayers: [],
  elapsed: 0,
  wallElapsed: 0,
  target: null,
  // version
  version: S.version || '0.0.0',
};

// ── Helpers ──────────────────────────────────────
function send(type, data){
  try{ window.chrome.webview.postMessage(JSON.stringify(data===undefined?{type}:{type,data})); }catch(e){}
}
function fmt(n){
  n=Number(n)||0;
  if(state.scoreFormat==='full') return n.toLocaleString();
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}
function fmtSec(s){
  s=Math.floor(s||0);
  if(s<60) return s+'초';
  return Math.floor(s/60)+'분 '+(s%60)+'초';
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function jobColor(kr){ return JOB_KR_TO_COLOR[kr]||'#446688'; }
function jobShort(kr){ return JOB_KR_TO_SHORT[kr]||kr?.charAt(0)||'?'; }
function jobFromCode(code){ return JOB_CODE_TO_KR[code]||null; }

function jobIconHtml(kr, size){
  const c=jobColor(kr), sh=jobShort(kr);
  return `<div class="job-icon" style="background:${c};width:${size}px;height:${size}px">${esc(sh)}</div>`;
}

// ── Status bar ───────────────────────────────────
function renderStatus(){
  const dot=document.getElementById('st-dot');
  const txt=document.getElementById('st-text');
  if(state.snifferErr){
    dot.className='st-dot err';
    txt.innerHTML=`<span style="color:#ff6666">${esc(state.snifferMsg)}</span>`;
  } else if(state.snifferOk){
    dot.className='st-dot ok';
    let s='';
    if(state.selfName){
      s+=`감지: <span class="st-name">${esc(state.selfName)}</span>`;
      if(state.ping>=0) s+=` <span class="st-ping">${state.ping}ms</span>`;
    } else {
      s=state.snifferMsg;
    }
    txt.innerHTML=s;
  } else {
    dot.className='st-dot';
    txt.textContent=state.snifferMsg;
  }
  // compact
  const cdot=document.getElementById('c-dot');
  cdot.className='c-dot'+(state.snifferOk?' ok':'');
  if(state.selfName) document.getElementById('c-name').textContent=state.selfName;
}

// ── Display toggle buttons ────────────────────────
function setSort(mode){
  state.displayModes[mode]=!state.displayModes[mode];
  [0,1,2].forEach(i=>{
    const b=document.getElementById('sb'+i);
    b.classList.toggle('on', state.displayModes[i]);
  });
  renderLookup();
  renderDps();
}
window.setSort=setSort;

// ── Party / 조회 tab ─────────────────────────────
function renderLookup(){
  const list=document.getElementById('party-list');
  const empty=document.getElementById('party-empty');
  const keys=state.partyOrder;

  if(!keys||keys.length===0){
    list.innerHTML=''; list.appendChild(empty); empty.style.display='flex'; return;
  }
  empty.style.display='none';

  // sort by cp when 전투력 display is on
  let sorted=[...keys];
  if(state.displayModes[2]){
    sorted.sort((a,b)=>(state.partyMap[b]?.cp||0)-(state.partyMap[a]?.cp||0));
  }

  const showJonggul=state.displayModes[0];
  const showNaked=state.displayModes[1];
  const showCp=state.displayModes[2];

  let html='';
  sorted.forEach(key=>{
    const m=state.partyMap[key]||{};
    const name=m.nickname||key.split(':')[0];
    const srv=m.serverName||'';
    const isSelf=key===state.selfKey;
    const kr=m.className||null;
    const cp=m.cp||0;

    html+=`<div class="party-row">`;
    html+=jobIconHtml(kr||'?', 22);
    html+=`<div class="party-info">`;
    html+=`<span class="party-name">${esc(name)}<span class="srv">${srv?`[${esc(srv)}]`:''}</span></span>`;
    if(m.loading) html+=`<span class="party-loading">조회 중...</span>`;
    html+=`</div>`;
    if(showJonggul&&m.hasJonggul) html+=`<span class="flag-badge jonggul-badge">종굴</span>`;
    if(showNaked&&m.hasNaked) html+=`<span class="flag-badge naked-badge">아이고</span>`;
    if(showCp){
      if(cp>0) html+=`<span class="party-cp">${cp.toLocaleString()}</span>`;
      else if(!m.loading) html+=`<span class="party-cp" style="color:var(--dim)">-</span>`;
    }
    if(isSelf) html+=`<span class="self-badge">나</span>`;
    html+=`</div>`;
  });

  list.innerHTML=html;
}

// ── DPS tab ───────────────────────────────────────
const DPS_COLORS=['#5599ff','#ff6b6b','#54d48a','#ffcc44','#cc77ff','#ff9944','#44ddcc','#ff7799'];

function renderDps(){
  const list=document.getElementById('dps-list');
  const empty=document.getElementById('dps-empty');
  const useWall=state.dpsTimeMode==='wallclock';
  const elapsed=useWall?state.wallElapsed:state.elapsed;
  document.getElementById('dps-elapsed').textContent=fmtSec(elapsed);
  document.getElementById('dps-total').textContent='총 '+(state.dpsPlayers?.length||0);

  if(!state.dpsPlayers||state.dpsPlayers.length===0){
    list.innerHTML=''; list.appendChild(empty); empty.style.display='flex'; return;
  }
  empty.style.display='none';

  const dpsKey=useWall?'wallDps':'dps';
  let sorted=[...state.dpsPlayers];
  sorted.sort((a,b)=>(b[dpsKey]||0)-(a[dpsKey]||0));

  const topDps=sorted[0]?.[dpsKey]||1;

  let html='';
  sorted.forEach((p,i)=>{
    const color=DPS_COLORS[i%DPS_COLORS.length];
    const dpsVal=p[dpsKey]||0;
    const barW=topDps>0?Math.max(1,Math.round(dpsVal/topDps*100)):0;
    const kr=jobFromCode(p.jobCode);
    const crit=p.critRate>0?Math.round(p.critRate*100)+'%':'-';
    const pctRaw=state.dpsPercentMode==='boss'?p.bossHpPercent:p.damagePercent;
    const pct=pctRaw>0?pctRaw.toFixed(1)+'%':'-';
    html+=`<div class="dps-row" data-eid="${p.entityId}">`;
    html+=`<div class="dps-bar" style="width:${barW}%;background:${color}"></div>`;
    html+=`<span class="dps-rank">${i+1}</span>`;
    html+=jobIconHtml(kr||'?', 20).replace('job-icon','dps-job');
    html+=`<span class="dps-name">${esc(p.name)}</span>`;
    html+=`<span class="dps-val">${fmt(dpsVal)}</span>`;
    html+=`<span class="dps-pct">${pct}</span>`;
    html+=`<span class="dps-crit">${crit}</span>`;
    html+=`</div>`;
  });
  list.innerHTML=html;

  list.querySelectorAll('.dps-row').forEach(r=>{
    r.addEventListener('mousedown',e=>e.stopPropagation());
    r.addEventListener('click',e=>{
      e.stopPropagation();
      send('dps-detail-pin',{entityId:parseInt(r.dataset.eid,10),maskNick:false});
    });
  });

  // compact
  if(sorted[0]){
    document.getElementById('c-dps').textContent=fmt(sorted[0][dpsKey]||0);
  }
}

// ── Tab switch ────────────────────────────────────
function switchTab(tab){
  state.tab=tab;
  document.getElementById('lookup-pane').classList.toggle('active',tab==='lookup');
  document.getElementById('dps-pane').classList.toggle('active',tab==='dps');
  document.getElementById('tab-lookup').className='tabx'+(tab==='lookup'?' active-lookup':'');
  document.getElementById('tab-dps').className='tabx'+(tab==='dps'?' active-dps':'');
  send('set-active-tab',tab==='dps'?'dps':'party');
}
window.switchTab=switchTab;

// ── Messages from C# ──────────────────────────────
function onMessage(e){
  let msg;
  try{ msg=typeof e.data==='string'?JSON.parse(e.data):e.data; }catch(ex){ return; }
  const {type,data}=msg;

  switch(type){
    case 'dps-update':
      state.dpsPlayers=data.players||[];
      state.elapsed=data.elapsedSeconds||0;
      state.wallElapsed=data.wallElapsedSeconds||0;
      state.target=data.target||null;
      // sync combat power from known party data into dps players
      state.dpsPlayers.forEach(p=>{
        const key=`${p.name}:${p.serverId}`;
        if(state.partyMap[key]?.cp) p.combatPower=state.partyMap[key].cp;
      });
      renderDps();
      break;

    case 'party-sync':
      // data: string[] "nickname:serverId"
      const newKeys=data||[];
      // keep existing entries, add new ones
      const prevMap={...state.partyMap};
      state.partyMap={};
      newKeys.forEach(key=>{
        const [nick,sid]=key.split(':');
        if(prevMap[key]) state.partyMap[key]=prevMap[key];
        else state.partyMap[key]={nickname:nick,serverId:parseInt(sid)||0,serverName:'',loading:true,error:false,cp:0,className:null};
      });
      state.partyOrder=newKeys;
      renderLookup();
      break;

    case 'party-clear':
      state.partyMap={};
      state.partyOrder=[];
      renderLookup();
      break;

    case 'character':
      // {nickname, server_id, server_name, type, loading, error, score:{combatPower,class,...}}
      if(!data||!data.nickname) break;
      const ckey=`${data.nickname}:${data.server_id}`;
      if(!state.partyMap[ckey]){
        state.partyMap[ckey]={nickname:data.nickname,serverId:data.server_id,serverName:data.server_name||'',loading:false,error:false,cp:0,className:null,hasJonggul:false,hasNaked:false};
        if(!state.partyOrder.includes(ckey)) state.partyOrder.push(ckey);
      }
      const entry=state.partyMap[ckey];
      entry.serverName=data.server_name||entry.serverName||'';
      entry.loading=data.loading===true;
      entry.error=data.error===true;
      if(data.score){
        entry.cp=data.score.combatPower||0;
        entry.className=data.score.class||null;
        entry.hasJonggul=data.score.hasJonggul===true;
        entry.hasNaked=data.score.hasNaked===true;
      }
      if(data.type==='self_login'||data.type==='self'){
        state.selfKey=ckey;
        state.selfName=data.nickname;
        renderStatus();
      }
      renderLookup();
      break;

    case 'ping-update':
      state.ping=data;
      renderStatus();
      break;

    case 'sniffer-error':
      state.snifferErr=true;
      state.snifferMsg=data||'오류';
      renderStatus();
      break;

    case 'preload-done':
      state.snifferOk=true;
      state.snifferErr=false;
      state.snifferMsg='패킷 캡처 중';
      renderStatus();
      break;

    case 'status':
      if(data?.text){
        state.snifferMsg=data.text;
        state.snifferErr=false;
        if(data.type==='active') state.snifferOk=true;
      }
      renderStatus();
      break;

    case 'toggle-compact':
      state.compact=!state.compact;
      document.getElementById('app').classList.toggle('compact',state.compact);
      send('set-compact',state.compact);
      break;

    case 'switch-tab':
      switchTab(state.tab==='lookup'?'dps':'lookup');
      break;

    case 'combat-started':
      state.dpsPlayers=[];
      state.elapsed=0;
      state.wallElapsed=0;
      renderDps();
      if(state.autoTabSwitch) switchTab('dps');
      break;

    case 'clear-shortcut':
      state.dpsPlayers=[];
      state.elapsed=0;
      renderDps();
      break;

    case 'settings-sync':
      if(data){
        if(data.dpsPercentMode!=null) state.dpsPercentMode=data.dpsPercentMode;
        if(data.scoreFormat!=null) state.scoreFormat=data.scoreFormat;
        if(data.dpsTimeMode!=null) state.dpsTimeMode=data.dpsTimeMode;
        if(data.autoTabSwitch!=null) state.autoTabSwitch=data.autoTabSwitch;
        renderDps();
      }
      break;

    case 'theme-changed':
      applyTheme(data);
      break;

    case 'shortcuts-updated':
    case 'overlay-only-changed':case 'tracked-skills-updated':
    case 'combat-record-saved':
      break;
  }
}

if(window.chrome&&window.chrome.webview)
  window.chrome.webview.addEventListener('message',onMessage);

// ── Buttons ───────────────────────────────────────
function noPropagate(id, fn){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('mousedown',e=>e.stopPropagation());
  el.addEventListener('click',e=>{ e.stopPropagation(); fn(e); });
}
noPropagate('btn-reset', ()=>send('dps-reset'));
noPropagate('btn-settings', ()=>send('open-settings'));
noPropagate('btn-close', ()=>send('close-window'));
noPropagate('btn-shot', ()=>{ /* snapshot stub */ });
noPropagate('btn-vis', ()=>{
  const v=!state.compact;
  state.compact=v;
  document.getElementById('app').classList.toggle('compact',v);
  send('set-compact',v);
});
noPropagate('btn-lock', ()=>{
  state.clickLocked=!state.clickLocked;
  document.getElementById('btn-lock').textContent=state.clickLocked?'🔒':'🔓';
  document.getElementById('btn-lock').classList.toggle('active',state.clickLocked);
  send('set-click-locked',state.clickLocked);
});

// Opacity slider
const slider=document.getElementById('opacity-slider');
slider.value=S.opacity||80;
slider.addEventListener('mousedown',e=>e.stopPropagation());
slider.addEventListener('input',()=>{
  const v=parseInt(slider.value,10);
  document.documentElement.style.opacity=v/100;
  send('set-opacity',v);
});

// Drag
document.getElementById('tb').addEventListener('mousedown',e=>{
  if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
  send('drag-start');
});
document.getElementById('compact-bar').addEventListener('mousedown',e=>{
  send('drag-start');
});

// Resize handles
document.querySelectorAll('[data-dir]').forEach(el=>{
  el.addEventListener('mousedown',e=>{ e.stopPropagation(); send('resize-start',el.dataset.dir); });
});

// Global mouseup
window.addEventListener('mouseup',()=>send('mouse-up'));

// ── Init ─────────────────────────────────────────
document.getElementById('brand-ver').textContent='v'+state.version;
if(S.opacity){slider.value=S.opacity;document.documentElement.style.opacity=S.opacity/100;}
try{ if(window.__THEME__) applyTheme(window.__THEME__); }catch(e){}

// init display toggle buttons to match initial state
[0,1,2].forEach(i=>{
  const b=document.getElementById('sb'+i);
  if(b) b.classList.toggle('on', state.displayModes[i]);
});

// initial render
renderStatus();
renderLookup();
renderDps();

send('ui-ready');
})();
</script>
